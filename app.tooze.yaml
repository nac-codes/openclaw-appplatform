name: openclaw-tooze
region: nyc # closest to Adam's NYC base — match Spaces bucket region

workers:
  - name: openclaw
    dockerfile_path: /Dockerfile
    source_dir: /
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-2gb # 2GB minimum (heap)
    github:
      branch: main
      # Point this at the user's fork once forked.
      repo: nac-codes/openclaw-appplatform

    envs:
      # ============================================================
      # IDENTITY
      # ============================================================
      - {key: STABLE_HOSTNAME, scope: RUN_TIME, value: openclaw-tooze}
      - {key: OPENCLAW_GATEWAY_TOKEN, scope: RUN_TIME, type: SECRET}

      # ============================================================
      # FEATURE FLAGS — Stage 3 (Tailscale + Spaces, no public exposure)
      # ============================================================
      - {key: ENABLE_NGROK, scope: RUN_TIME, value: "false"}
      - {key: TAILSCALE_ENABLE, scope: RUN_TIME, value: "true"}
      - {key: ENABLE_SPACES, scope: RUN_TIME, value: "true"}
      - {key: ENABLE_UI, scope: RUN_TIME, value: "true"}
      - {key: SSH_ENABLE, scope: RUN_TIME, value: "false"}

      # ============================================================
      # TAILSCALE — for chim's private access to the Control UI
      # TS_EXTRA_ARGS=--ssh enables Tailscale SSH (admin shells via tailnet)
      # ============================================================
      - {key: TS_AUTHKEY, scope: RUN_TIME, type: SECRET}
      - {key: TS_EXTRA_ARGS, scope: RUN_TIME, value: "--ssh"}

      # ============================================================
      # DO SPACES — persistence (refresh tokens, agent memory, telegram allowlist)
      # NOTE: bucket must exist in same region as this app (nyc -> nyc3.digitaloceanspaces.com)
      # ============================================================
      - {key: RESTIC_SPACES_ACCESS_KEY_ID, scope: RUN_TIME, type: SECRET}
      - {key: RESTIC_SPACES_SECRET_ACCESS_KEY, scope: RUN_TIME, type: SECRET}
      - {key: RESTIC_SPACES_ENDPOINT, scope: RUN_TIME, value: nyc3.digitaloceanspaces.com}
      - {key: RESTIC_SPACES_BUCKET, scope: RUN_TIME, value: tooze-openclaw-backup}
      - {key: RESTIC_PASSWORD, scope: RUN_TIME, type: SECRET}

      # ============================================================
      # MODEL — primary inference
      # OpenClaw will use OPENAI_API_KEY for the openai/* model family.
      # ============================================================
      - {key: OPENAI_API_KEY, scope: RUN_TIME, type: SECRET}

      # ============================================================
      # TELEGRAM — bot token from @BotFather (used by openclaw telegram channel)
      # ============================================================
      - {key: TELEGRAM_BOT_TOKEN, scope: RUN_TIME, type: SECRET}

      # ============================================================
      # GOG — file keyring passphrase (so headless gog can read/write tokens
      # without TTY prompts). MUST be present in every gog invocation's env.
      # ============================================================
      - {key: GOG_KEYRING_PASSWORD, scope: RUN_TIME, type: SECRET}
